<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ name }} — Summary</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
        .container { max-width: 800px; margin: 0 auto; padding: 2rem; }
        .back { color: #3b82f6; text-decoration: none; display: inline-block; margin-bottom: 1.5rem; }
        .back:hover { text-decoration: underline; }
        .content { background: #1e293b; border-radius: 12px; padding: 2rem; border: 1px solid #334155; line-height: 1.7; }
        .content h1 { font-size: 1.6rem; margin-bottom: 1rem; color: #f8fafc; }
        .content h2 { font-size: 1.2rem; margin: 1.5rem 0 0.75rem; color: #93c5fd; border-bottom: 1px solid #334155; padding-bottom: 0.5rem; }
        .content p { margin-bottom: 0.75rem; }
        .content ul { margin: 0.5rem 0 1rem 1.5rem; }
        .content li { margin-bottom: 0.4rem; }
        .content strong { color: #f1f5f9; }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back">Back to Dashboard</a>
        <div class="content">
            {{ content | replace('\n\n', '</p><p>') | replace('\n- ', '</p><li>') | replace('## ', '</p><h2>') | replace('# ', '</p><h1>') | safe }}
        </div>
    </div>
</body>
</html>
